<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Sales Forecast Pivot</title>
  <link rel="stylesheet" crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/@perspective-dev/viewer@4.5.2/dist/css/themes.css" />
  <style>
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: #1a1a1e; }
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      background: #17171a;
      border-bottom: 2px solid #3b82f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e5e7eb;
    }
    #header h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
      letter-spacing: 0.02em;
    }
    #header span {
      font-size: 12px;
      color: #9ca3af;
    }
    perspective-viewer {
      height: calc(100vh - 44px);
      width: 100vw;
      display: block;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>Sales Forecast — Retailer / SKU / Week</h1>
    <span id="last-updated">loading…</span>
  </div>
  <perspective-viewer id="viewer" settings></perspective-viewer>

  <script type="module">
    import "https://cdn.jsdelivr.net/npm/@perspective-dev/viewer@4.5.2/dist/cdn/perspective-viewer.js";
    import "https://cdn.jsdelivr.net/npm/@perspective-dev/viewer-datagrid@4.5.2/dist/cdn/perspective-viewer-datagrid.js";
    import perspective from "https://cdn.jsdelivr.net/npm/@perspective-dev/client@4.5.2/dist/cdn/perspective.js";

    (async () => {
      const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
      const websocket = await perspective.websocket(`${wsProtocol}//${window.location.host}/websocket`);
      const server_table = await websocket.open_table("forecast");
      const viewer = document.getElementById("viewer");
      await viewer.load(server_table);

      // Default layout for the retailer/sku/week_date table:
      // parent rows = retailer -> retailer_sku, parent columns = week_date,
      // nested under each week = units_sold/forecast/difference/difference_pct.
      // Drag fields in the UI to rearrange — this is just the starting shape.
      await viewer.restore({
        group_by: ["retailer", "retailer_sku"],
        split_by: ["week_date"],
        columns: ["units_sold", "forecast", "difference", "difference_pct"],
        aggregates: {
          units_sold: "sum",
          forecast: "sum",
          difference: "sum",
          difference_pct: "avg",
        },
        sort: [["difference", "asc"]],
        plugin: "Datagrid",
        theme: "Pro Dark",
        settings: true,
        columns_config: {
          difference: {
            number_bg_mode: "gradient",
            number_fg_mode: "gradient",
            pos_bg_color: "#1f9d55",
            neg_bg_color: "#c0392b",
            pos_fg_color: "#4ade80",
            neg_fg_color: "#f87171",
          },
          difference_pct: {
            number_bg_mode: "gradient",
            number_fg_mode: "gradient",
            pos_bg_color: "#1f9d55",
            neg_bg_color: "#c0392b",
            pos_fg_color: "#4ade80",
            neg_fg_color: "#f87171",
          },
        },
      });

      document.getElementById("last-updated").textContent =
        "loaded " + new Date().toLocaleString();
    })();
  </script>
</body>
</html>
