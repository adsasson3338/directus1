<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Sales Forecast Pivot</title>
  <link rel="stylesheet" crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/@perspective-dev/viewer@4.5.2/dist/css/themes.css" />
  <style>
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; background: #1a1a1e; }
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      background: #17171a;
      border-bottom: 2px solid #3b82f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e5e7eb;
    }
    #header h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
      letter-spacing: 0.02em;
    }
    #header span {
      font-size: 12px;
      color: #9ca3af;
    }
    perspective-viewer {
      height: calc(100vh - 44px);
      width: 100vw;
      display: block;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>Sales Forecast Dashboard</h1>
    <div style="display:flex; align-items:center; gap:14px;">
      <select id="table-select" style="background:#222; color:#e5e7eb; border:1px solid #3b3b40; border-radius:4px; padding:4px 8px; font-size:12px;"></select>
      <span id="last-updated">loading…</span>
    </div>
  </div>
  <perspective-viewer id="viewer" settings></perspective-viewer>

  <script type="module">
    import "https://cdn.jsdelivr.net/npm/@perspective-dev/viewer@4.5.2/dist/cdn/perspective-viewer.js";
    import "https://cdn.jsdelivr.net/npm/@perspective-dev/viewer-datagrid@4.5.2/dist/cdn/perspective-viewer-datagrid.js";
    import perspective from "https://cdn.jsdelivr.net/npm/@perspective-dev/client@4.5.2/dist/cdn/perspective.js";

    // Per-table default layouts. Add an entry here for any table where you
    // want a specific starting view; anything not listed loads flat and
    // lets you configure it by hand in the sidebar.
    const TABLE_DEFAULTS = {
      v_forecast_tidy: {
        group_by: ["retailer", "retailer_sku"],
        split_by: ["week_date"],
        columns: ["units_sold", "forecast", "difference", "difference_pct"],
        aggregates: {
          units_sold: "sum",
          forecast: "sum",
          difference: "sum",
          difference_pct: "avg",
        },
        sort: [["difference", "asc"]],
        plugin: "Datagrid",
        theme: "Pro Dark",
        settings: true,
        columns_config: {
          difference: {
            number_bg_mode: "gradient",
            number_fg_mode: "gradient",
            pos_bg_color: "#1f9d55",
            neg_bg_color: "#c0392b",
            pos_fg_color: "#4ade80",
            neg_fg_color: "#f87171",
          },
          difference_pct: {
            number_bg_mode: "gradient",
            number_fg_mode: "gradient",
            pos_bg_color: "#1f9d55",
            neg_bg_color: "#c0392b",
            pos_fg_color: "#4ade80",
            neg_fg_color: "#f87171",
          },
        },
      },
    };

    (async () => {
      const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
      const websocket = await perspective.websocket(`${wsProtocol}//${window.location.host}/websocket`);
      const viewer = document.getElementById("viewer");
      const select = document.getElementById("table-select");
      const statusEl = document.getElementById("last-updated");

      const tableNames = await websocket.get_hosted_table_names();
      tableNames.sort();

      select.innerHTML = "";
      for (const name of tableNames) {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      }

      // Respect ?table=name in the URL if present and valid, else first table.
      const params = new URLSearchParams(window.location.search);
      const requested = params.get("table");
      const initial = tableNames.includes(requested) ? requested : tableNames[0];
      select.value = initial;

      async function loadTable(name) {
        statusEl.textContent = "loading " + name + "…";
        const server_table = await websocket.open_table(name);
        await viewer.load(server_table);
        const defaults = TABLE_DEFAULTS[name];
        if (defaults) {
          await viewer.restore(defaults);
        } else {
          await viewer.restore({ plugin: "Datagrid", theme: "Pro Dark", settings: true });
        }
        statusEl.textContent = name + " — loaded " + new Date().toLocaleString();
        const url = new URL(window.location);
        url.searchParams.set("table", name);
        window.history.replaceState({}, "", url);
      }

      select.addEventListener("change", () => loadTable(select.value));

      await loadTable(initial);
    })();
  </script>
</body>
</html>
