<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Sales Forecast Pivot</title>
  <link rel="stylesheet" crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/@perspective-dev/viewer@4.5.2/dist/css/themes.css" />
  <style>
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      background: #1a1a1e;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    #header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      background: #17171a;
      border-bottom: 2px solid #3b82f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e5e7eb;
    }
    #header h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
      letter-spacing: 0.02em;
    }
    #header span {
      font-size: 12px;
      color: #9ca3af;
    }
    perspective-viewer {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>Sales Forecast Dashboard</h1>
    <div style="display:flex; align-items:center; gap:10px;">
      <select id="table-select" style="background:#222; color:#e5e7eb; border:1px solid #3b3b40; border-radius:4px; padding:4px 8px; font-size:12px;"></select>
      <select id="view-select" style="background:#222; color:#e5e7eb; border:1px solid #3b3b40; border-radius:4px; padding:4px 8px; font-size:12px; max-width:180px;"></select>
      <button id="save-view-btn" title="Save current layout as a named view" style="background:#2563eb; color:#fff; border:none; border-radius:4px; padding:4px 10px; font-size:12px; cursor:pointer;">Save view</button>
      <button id="delete-view-btn" title="Delete the selected saved view" style="background:#3b3b40; color:#e5e7eb; border:none; border-radius:4px; padding:4px 10px; font-size:12px; cursor:pointer; display:none;">Delete</button>
      <button id="refresh-btn" title="Pull the latest data from Postgres right now" style="background:#3b3b40; color:#e5e7eb; border:none; border-radius:4px; padding:4px 10px; font-size:12px; cursor:pointer;">Refresh data</button>
      <input id="search-box" type="text" placeholder="Search…" style="background:#222; color:#e5e7eb; border:1px solid #3b3b40; border-radius:4px; padding:4px 8px; font-size:12px; width:160px;" />
      <span id="last-updated">loading…</span>
    </div>
  </div>
  <perspective-viewer id="viewer" settings></perspective-viewer>

  <script type="module">
    import "https://cdn.jsdelivr.net/npm/@perspective-dev/viewer@4.5.2/dist/cdn/perspective-viewer.js";
    import "https://cdn.jsdelivr.net/npm/@perspective-dev/viewer-datagrid@4.5.2/dist/cdn/perspective-viewer-datagrid.js";
    import perspective from "https://cdn.jsdelivr.net/npm/@perspective-dev/client@4.5.2/dist/cdn/perspective.js";

    // Per-table default layouts. Add an entry here for any table where you
    // want a specific starting view; anything not listed falls back to
    // GENERIC_DEFAULT below and lets you configure it by hand in the sidebar.
    const GENERIC_DEFAULT = {
      plugin: "Datagrid",
      theme: "Pro Dark",
      settings: true,
    };

    const TABLE_DEFAULTS = {
      v_weekly_forecast_report: {
        version: "4.5.2",
        columns_config: {
          units_sold: { fixed: 0 },
          forecast: { fixed: 0 },
          difference: {
            number_format: { minimumFractionDigits: 0, maximumFractionDigits: 0 },
          },
          difference_pct: { fixed: 2 },
        },
        plugin: "Datagrid",
        plugin_config: {},
        settings: true,
        theme: "Pro Dark",
        title: null,
        group_by: ["retailer", "sku_label"],
        split_by: ["week_date"],
        sort: [],
        filter: [["week_date", ">", "2026-01-01"]],
        group_rollup_mode: "flat",
        expressions: {
          sku_label: "// sku_label\nconcat(\"retailer_sku\", ' (', \"supplier_sku\", ')')",
          search_corpus: "// search_corpus\nconcat(\"retailer\", ' ', \"retailer_sku\", ' ', \"supplier_sku\")",
        },
        columns: ["units_sold", "forecast", "difference", "difference_pct", "yoy_change"],
        aggregates: {},
      },
      v_monthly_forecast_report: {
        version: "4.5.2",
        columns_config: {
          units_sold: { fixed: 0 },
          forecast: {
            number_format: { minimumFractionDigits: 0, maximumFractionDigits: 0 },
          },
          difference: {
            number_format: { minimumFractionDigits: 0, maximumFractionDigits: 0 },
          },
          difference_pct: { fixed: 2 },
        },
        plugin: "Datagrid",
        plugin_config: {},
        settings: true,
        theme: "Pro Dark",
        title: null,
        group_by: ["retailer", "sku_label"],
        split_by: ["month"],
        sort: [],
        filter: [["month", ">", "2026-01-01"]],
        group_rollup_mode: "flat",
        expressions: {
          sku_label: "concat(\"retailer_sku\", ' (', \"supplier_sku\", ')')",
          search_corpus: "concat(\"retailer\", ' ', \"retailer_sku\", ' ', \"supplier_sku\")",
        },
        columns: ["units_sold", "forecast", "difference", "difference_pct", "yoy_change"],
        aggregates: {},
      },
      v_quarterly_forecast_report: {
        version: "4.5.2",
        columns_config: {
          total_units: { fixed: 0 },
          quarterly_forecast: {
            number_format: { minimumFractionDigits: 0, maximumFractionDigits: 0 },
          },
          difference: {
            number_format: { minimumFractionDigits: 0, maximumFractionDigits: 0 },
          },
          difference_pct: { fixed: 2 },
        },
        plugin: "Datagrid",
        plugin_config: {},
        settings: true,
        theme: "Pro Dark",
        title: null,
        group_by: ["retailer", "sku_label"],
        split_by: ["quarter"],
        sort: [],
        filter: [["quarter", ">", "2026"]],
        group_rollup_mode: "flat",
        expressions: {
          sku_label: "concat(\"retailer_sku\", ' (', \"supplier_sku\", ')')",
          search_corpus: "concat(\"retailer\", ' ', \"retailer_sku\", ' ', \"supplier_sku\")",
        },
        columns: ["total_units", "quarterly_forecast", "difference", "difference_pct", "yoy_change"],
        aggregates: {},
      },
      v_inventory_tracker: {
        version: "4.5.2",
        columns_config: {
          av_now: { fixed: 0 },
          on_hand: { fixed: 0 },
          in_transit: { fixed: 0 },
          purchase_order: { fixed: 0 },
          total_supply: { fixed: 0 },
          retailer_on_hand: { fixed: 0 },
          forecast_17wk: {
            number_format: { minimumFractionDigits: 0, maximumFractionDigits: 0 },
          },
          months_cover: { fixed: 1 },
        },
        plugin: "Datagrid",
        plugin_config: {},
        settings: true,
        theme: "Pro Dark",
        title: null,
        group_by: ["retailer", "sku_label"],
        split_by: [],
        sort: [["supplier_sku", "desc"]],
        filter: [],
        group_rollup_mode: "flat",
        expressions: {
          sku_label: "concat(\"retailer_sku\", ' (', \"supplier_sku\", ')')",
          search_corpus: "concat(\"retailer\", ' ', \"retailer_sku\", ' ', \"supplier_sku\", ' ', \"description\", ' ', \"allocation_name\", ' ', \"status\")",
        },
        columns: [
          "allocation_name",
          "description",
          "av_now",
          "on_hand",
          "in_transit",
          "purchase_order",
          "total_supply",
          "retailer_on_hand",
          "retailer_inventory_date",
          "forecast_17wk",
          "months_cover",
          "status",
        ],
        aggregates: {
          description: "unique",
          retailer_inventory_date: "unique",
          status: "unique",
          allocation_name: "unique",
        },
      },
      v_inventory_variants: {
        version: "4.5.2",
        columns_config: {
          av_now: { fixed: 0 },
          on_hand: { fixed: 0 },
          in_transit: { fixed: 0 },
          purchase_order: { fixed: 0 },
          total_supply: { fixed: 0 },
          retailer_forecast_17wk: {
            number_format: { minimumFractionDigits: 0, maximumFractionDigits: 0 },
          },
          months_cover: { fixed: 1 },
        },
        plugin: "Datagrid",
        plugin_config: {},
        settings: true,
        theme: "Pro Dark",
        title: null,
        group_by: ["retailer", "sku_label"],
        split_by: [],
        sort: [["variant_sku", "asc"]],
        filter: [],
        group_rollup_mode: "flat",
        expressions: {
          sku_label: "concat(\"retailer_sku\", ' (', \"variant_sku\", ')')",
          search_corpus: "concat(\"retailer\", ' ', \"retailer_sku\", ' ', \"variant_sku\", ' ', \"variant_description\", ' ', \"allocation_name\", ' ', \"status\")",
        },
        columns: [
          "allocation_name",
          "variant_description",
          "av_now",
          "on_hand",
          "in_transit",
          "purchase_order",
          "total_supply",
          "retailer_forecast_17wk",
          "months_cover",
          "status",
        ],
        aggregates: {
          status: "unique",
          variant_description: "unique",
          allocation_name: "unique",
        },
      },
    };

    let websocket = null;
    let currentTableName = null;
    let lastGoodConfig = null;
    let reconnecting = false;
    let savedViewsCache = {}; // name -> config, for the currently selected table

    const viewer = document.getElementById("viewer");
    const select = document.getElementById("table-select");
    const viewSelect = document.getElementById("view-select");
    const saveBtn = document.getElementById("save-view-btn");
    const deleteBtn = document.getElementById("delete-view-btn");
    const statusEl = document.getElementById("last-updated");

    const DEFAULT_VIEW_OPTION = "__default__";

    function wsProtocol() {
      return window.location.protocol === "https:" ? "wss:" : "ws:";
    }

    async function fetchSavedViews(table) {
      try {
        const res = await fetch(`/api/views?table=${encodeURIComponent(table)}`);
        const data = await res.json();
        return data.views || {};
      } catch (e) {
        console.warn("Failed to load saved views for", table, e);
        return {};
      }
    }

    async function saveCurrentView(table) {
      const name = prompt("Name this view (visible to everyone using the dashboard):");
      if (!name) return;
      const config = await viewer.save();
      try {
        const res = await fetch("/api/views", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ table, name, config }),
        });
        if (!res.ok) throw new Error(await res.text());
        await populateViewSelect(table);
        viewSelect.value = name;
      } catch (e) {
        console.error("Failed to save view", e);
        alert("Couldn't save the view — check the console for details.");
      }
    }

    async function deleteCurrentView(table) {
      const name = viewSelect.value;
      if (name === DEFAULT_VIEW_OPTION) return;
      if (!confirm(`Delete the saved view "${name}" for everyone?`)) return;
      try {
        await fetch(`/api/views?table=${encodeURIComponent(table)}&name=${encodeURIComponent(name)}`, {
          method: "DELETE",
        });
        await populateViewSelect(table);
        await applySelectedView();
      } catch (e) {
        console.error("Failed to delete view", e);
        alert("Couldn't delete the view — check the console for details.");
      }
    }

    async function populateViewSelect(table) {
      savedViewsCache = await fetchSavedViews(table);
      viewSelect.innerHTML = "";
      const defaultOpt = document.createElement("option");
      defaultOpt.value = DEFAULT_VIEW_OPTION;
      defaultOpt.textContent = "Default layout";
      viewSelect.appendChild(defaultOpt);
      for (const name of Object.keys(savedViewsCache).sort()) {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        viewSelect.appendChild(opt);
      }
      deleteBtn.style.display = "none";
    }

    async function applySelectedView() {
      const chosen = viewSelect.value;
      if (chosen === DEFAULT_VIEW_OPTION) {
        const defaults = TABLE_DEFAULTS[currentTableName] || GENERIC_DEFAULT;
        await viewer.restore(defaults);
        deleteBtn.style.display = "none";
      } else if (savedViewsCache[chosen]) {
        await viewer.restore(savedViewsCache[chosen]);
        deleteBtn.style.display = "inline-block";
      }
    }

    async function loadTable(name, restoreConfig) {
      statusEl.textContent = "loading " + name + "…";
      // Force a live pull from Postgres before showing data, so a refresh or
      // reconnect never shows up-to-5-minutes-stale data from the periodic cycle.
      try {
        await fetch(`/api/refresh?table=${encodeURIComponent(name)}`, { method: "POST" });
      } catch (e) {
        console.warn("On-demand refresh request failed, showing existing data", e);
      }
      const server_table = await websocket.open_table(name);
      await viewer.load(server_table);
      await populateViewSelect(name);
      const defaults = restoreConfig || TABLE_DEFAULTS[name] || GENERIC_DEFAULT;
      await viewer.restore(defaults);
      currentTableName = name;
      statusEl.textContent = name + " — loaded " + new Date().toLocaleString();
      const url = new URL(window.location);
      url.searchParams.set("table", name);
      window.history.replaceState({}, "", url);
    }

    async function connect() {
      websocket = await perspective.websocket(`${wsProtocol()}//${window.location.host}/websocket`);

      const tableNames = await websocket.get_hosted_table_names();
      tableNames.sort();

      if (select.options.length === 0) {
        for (const name of tableNames) {
          const opt = document.createElement("option");
          opt.value = name;
          opt.textContent = name;
          select.appendChild(opt);
        }
        const params = new URLSearchParams(window.location.search);
        const requested = params.get("table");
        select.value = tableNames.includes(requested) ? requested : tableNames[0];
      }

      const nameToLoad = currentTableName || select.value;
      // Prefer the user's last-known-good layout for this table over the
      // hardcoded default, so a reconnect doesn't wipe out manual sidebar tweaks.
      await loadTable(nameToLoad, lastGoodConfig);
    }

    function scheduleReconnect() {
      if (reconnecting) return;
      reconnecting = true;
      statusEl.textContent = "connection lost, reconnecting…";

      const attempt = async () => {
        try {
          // Best-effort snapshot of current layout before we lose the old client.
          try {
            lastGoodConfig = await viewer.save();
          } catch (e) {
            // viewer may already be in a bad state; fall back to stored config or table default.
          }
          await connect();
          reconnecting = false;
        } catch (e) {
          console.warn("Reconnect attempt failed, retrying in 3s", e);
          setTimeout(attempt, 3000);
        }
      };
      setTimeout(attempt, 1500);
    }

    // Perspective's ClientError surfaces as an unhandled promise rejection,
    // not a normal event we can subscribe to — catch it globally. Also fires
    // if the container itself restarts (e.g. the Docker healthcheck recovering
    // from a deadlock), since that closes the socket the same way a network
    // drop would.
    window.addEventListener("unhandledrejection", (event) => {
      if (disconnectedForVisibility) {
        // Expected — we intentionally terminated the connection.
        event.preventDefault();
        return;
      }
      const msg = String((event.reason && event.reason.message) || event.reason || "");
      if (msg.includes("WebSocket transport error") || msg.includes("ClientError") || msg.includes("Websocket")) {
        event.preventDefault();
        scheduleReconnect();
      }
    });

    const searchBox = document.getElementById("search-box");
    let searchDebounceTimer = null;

    async function applySearch(text) {
      const current = await viewer.save();
      const otherFilters = (current.filter || []).filter((f) => f[0] !== "search_corpus");
      const newFilters = text ? [...otherFilters, ["search_corpus", "contains", text]] : otherFilters;
      await viewer.restore({ filter: newFilters });
    }

    const refreshBtn = document.getElementById("refresh-btn");
    refreshBtn.addEventListener("click", async () => {
      if (!currentTableName) return;
      refreshBtn.disabled = true;
      refreshBtn.textContent = "Refreshing…";
      try {
        const res = await fetch(`/api/refresh?table=${encodeURIComponent(currentTableName)}`, { method: "POST" });
        const data = await res.json();
        if (data.status === "skipped") {
          statusEl.textContent = currentTableName + " — already current (refreshed moments ago)";
        } else {
          // The already-open view gets the new data pushed automatically over
          // the websocket once the server-side table updates — no reload needed.
          statusEl.textContent = currentTableName + " — refreshed " + new Date().toLocaleString();
        }
      } catch (e) {
        console.error("Manual refresh failed", e);
        statusEl.textContent = "refresh failed — check console";
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.textContent = "Refresh data";
      }
    });

    searchBox.addEventListener("input", () => {
      clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(() => applySearch(searchBox.value.trim()), 300);
    });

    select.addEventListener("change", async () => {
      lastGoodConfig = null; // switching tables intentionally — don't carry over old layout
      searchBox.value = "";
      await loadTable(select.value);
    });

    viewSelect.addEventListener("change", () => applySelectedView());
    saveBtn.addEventListener("click", () => saveCurrentView(currentTableName));
    deleteBtn.addEventListener("click", () => deleteCurrentView(currentTableName));

    let disconnectedForVisibility = false;

    async function disconnectForBackground() {
      if (!websocket) return;
      try {
        // Snapshot the layout so we can restore it exactly when we come back.
        lastGoodConfig = await viewer.save();
      } catch (e) {
        // ignore — best effort
      }
      try {
        await websocket.terminate();
      } catch (e) {
        console.warn("Error terminating websocket on background", e);
      }
      websocket = null;
      disconnectedForVisibility = true;
      statusEl.textContent = "paused (tab in background)";
    }

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        // Give it a short grace period — don't disconnect for a quick tab
        // switch, only for the tab actually sitting unattended for a while.
        setTimeout(() => {
          if (document.hidden) disconnectForBackground();
        }, 60000);
      } else if (disconnectedForVisibility) {
        disconnectedForVisibility = false;
        connect().catch((e) => {
          console.error("Reconnect after becoming visible failed", e);
          scheduleReconnect();
        });
      }
    });

    connect().catch((e) => {
      console.error("Initial connection failed", e);
      scheduleReconnect();
    });
  </script>
</body>
</html>
