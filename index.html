<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Sales Forecast Pivot</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@finos/perspective-viewer/dist/cdn/perspective-viewer.js"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@finos/perspective-viewer-datagrid/dist/cdn/perspective-viewer-datagrid.js"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@finos/perspective-viewer-d3fc/dist/cdn/perspective-viewer-d3fc.js"></script>
  <link rel="stylesheet" crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/@finos/perspective-viewer/dist/css/themes.css" />
  <style>
    html, body, perspective-viewer { height: 100%; width: 100%; margin: 0; padding: 0; }
  </style>
</head>
<body>
  <perspective-viewer id="viewer" style="width:100vw; height:100vh;"></perspective-viewer>

  <script type="module">
    import perspective from "https://cdn.jsdelivr.net/npm/@finos/perspective/dist/cdn/perspective.js";

    (async () => {
      const websocket = await perspective.websocket(`ws://${window.location.host}/websocket`);
      const server_table = await websocket.open_table("forecast");
      const viewer = document.getElementById("viewer");
      await viewer.load(server_table);

      // Default layout for the retailer/sku/week_date table:
      // parent rows = retailer -> retailer_sku, parent columns = week_date,
      // nested under each week = units_sold/forecast/difference/difference_pct.
      // Drag fields in the UI to rearrange — this is just the starting shape.
      await viewer.restore({
        group_by: ["retailer", "retailer_sku"],
        split_by: ["week_date"],
        columns: ["units_sold", "forecast", "difference", "difference_pct"],
        aggregates: {
          units_sold: "sum",
          forecast: "sum",
          difference: "sum",
          difference_pct: "avg",
        },
        plugin: "Datagrid",
        theme: "Pro Dark",
        columns_config: {
          difference: {
            number_bg_mode: "gradient",
            pos_bg_color: "#1f9d55",
            neg_bg_color: "#c0392b",
          },
          difference_pct: {
            number_bg_mode: "gradient",
            pos_bg_color: "#1f9d55",
            neg_bg_color: "#c0392b",
          },
        },
      });
    })();
  </script>
</body>
</html>
